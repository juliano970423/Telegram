name: Debug Build

on:
  push:
    branches: [main, master, dev]
  pull_request:
    branches: [main, master, dev]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Setup Android SDK
      uses: android-actions/setup-android@v2

    - name: Replace API keys in BuildVars.java
      run: |
        sed -i 's/public static int APP_ID = .*/public static int APP_ID = ${{ secrets.APP_ID }};/' TMessagesProj/src/main/java/org/telegram/messenger/BuildVars.java
        sed -i 's/public static String APP_HASH = ".*";/public static String APP_HASH = "${{ secrets.APP_HASH }}";/' TMessagesProj/src/main/java/org/telegram/messenger/BuildVars.java

    - name: Create google-services.json from secret
      run: |
        echo "${{ secrets.GOOGLE_SERVICES_JSON }}" > TMessagesProj_App/google-services.json

    - name: Build Debug APK
      run: ./gradlew :TMessagesProj_App:assembleAfatDebug

    - name: Find Debug APK
      run: find TMessagesProj_App/build/outputs -name "*.apk" -type f

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: telegram-debug.apk
        path: TMessagesProj_App/build/outputs/apk/afat/debug/app.apk